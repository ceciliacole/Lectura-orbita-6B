<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Resultado del envío</title></head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const ok = params.get("ok") === "1";
  const message = params.get("message") || (ok ? "Lectura registrada correctamente." : "No se pudo guardar.");
  window.parent.postMessage({
    source: "lectura-orbita-callback",
    ok,
    message
  }, location.origin);
</script>
</body>
</html>
